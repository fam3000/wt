<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#495057" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <!-- 加入主畫面顯示名稱 PCB -->
  <meta name="apple-mobile-web-app-title" content="PCB">
  <!-- 安卓通用圖標 -->
  <link rel="icon" type="image/png" sizes="192x192" href="wistron-pcb-icon.png">
  <!-- iOS加入主畫面圖標 -->
  <link rel="apple-touch-icon" href="wistron-pcb-icon.png">
  <!-- 網頁標題同步改為PCB -->
  <title>PCB</title>
  <style>
    :root {
      --color-main: #495057;
      --color-gray: #adb5bd;
      --color-light: #e9ecef;
      --color-bg: #f5f5f5;
      --color-white: #ffffff;
      --color-border: #d9dee3;
      --color-shadow: rgba(0, 0, 0, 0.08);
      --radius: 8px;
      --gap: 8px;
      --btn-h: 36px;
      --header-h: 52px;
      --trans: 0.2s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--color-bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft JhengHei", sans-serif;
      color: var(--color-main);
      font-size: 14px;
    }

    .app-shell {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .app-header {
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: var(--gap);
      padding: 0 var(--gap);
      background: var(--color-white);
      border-bottom: 1px solid var(--color-light);
      flex-shrink: 0;
      box-shadow: 0 1px 4px var(--color-shadow);
      z-index: 10;
    }

    .app-logo {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: var(--color-main);
      flex-shrink: 0;
      animation: bounce 1s infinite alternate;
      user-select: none;
    }

    @keyframes bounce {
      0% { transform: translateY(0); }
      100% { transform: translateY(-4px); }
    }

    .tab-scroll-wrap {
      flex: 1;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    .tab-scroll-wrap::-webkit-scrollbar {
      display: none;
    }

    .tab-bar {
      min-width: max-content;
      display: flex;
      align-items: center;
      gap: var(--gap);
      height: 100%;
      padding: 0 4px;
    }

    .tab-btn {
      height: var(--btn-h);
      min-width: 88px;
      padding: 0 14px;
      border: none;
      border-radius: var(--radius);
      background: var(--color-light);
      color: var(--color-main);
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: all var(--trans);
      flex-shrink: 0;
    }

    .tab-btn:active {
      transform: scale(0.98);
    }

    .tab-btn.active {
      background: var(--color-gray);
      color: var(--color-white);
    }

    .main-area {
      flex: 1;
      width: 100%;
      position: relative;
      overflow: hidden;
      background: var(--color-bg);
    }

    .iframe-wrap {
      width: 100%;
      height: 100%;
      position: relative;
      background: var(--color-white);
    }

    .tool-frame {
      width: 100%;
      height: 100%;
      border: none;
      background: var(--color-white);
      display: block;
    }

    .loading-tip {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 5;
      background: rgba(73, 80, 87, 0.88);
      color: #fff;
      padding: 7px 12px;
      border-radius: 999px;
      font-size: 12px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: all 0.22s ease;
    }

    .loading-tip.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 640px) {
      .app-logo {
        font-size: 1.35rem;
      }

      .tab-btn {
        min-width: 82px;
        padding: 0 12px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-logo">PCB</div>

      <div class="tab-scroll-wrap">
        <div class="tab-bar" id="tabBar"></div>
      </div>
    </header>

    <main class="main-area">
      <div class="iframe-wrap">
        <div class="loading-tip" id="loadingTip">載入中...</div>

        <iframe
          id="toolFrame"
          class="tool-frame"
          title="工具內容"
          sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups allow-downloads"
        ></iframe>
      </div>
    </main>
  </div>

  <script>
    const tools = [
      { name: 'PCB', src: 'pcb.html' },
      { name: 'CTW', src: 'ctw.html' },
      { name: 'MYT', src: 'myt.html' },
      { name: 'DIP', src: 'dip.html' },
      { name: 'DC', src: 'dc.html' }
    ];

    const tabBar = document.getElementById('tabBar');
    const toolFrame = document.getElementById('toolFrame');
    const loadingTip = document.getElementById('loadingTip');

    let currentSrc = '';

    function renderTabs() {
      tabBar.innerHTML = tools.map((tool, index) => `
        <button
          class="tab-btn ${index === 0 ? 'active' : ''}"
          type="button"
          data-src="${tool.src}"
          data-name="${tool.name}"
        >
          ${tool.name}
        </button>
      `).join('');

      if (tools.length > 0) {
        loadTool(tools[0].src);
      }
    }

    function setActiveButton(src) {
      tabBar.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.src === src);
      });
    }

    function showLoading(show = true) {
      loadingTip.classList.toggle('show', show);
    }

    function loadTool(src) {
      if (!src || src === currentSrc) return;
      currentSrc = src;
      showLoading(true);
      toolFrame.src = src;
      setActiveButton(src);
    }

    tabBar.addEventListener('click', (e) => {
      const btn = e.target.closest('.tab-btn');
      if (!btn) return;
      loadTool(btn.dataset.src);
    });

    toolFrame.addEventListener('load', () => {
      showLoading(false);
    });

    renderTabs();
  </script>
</body>
</html>
