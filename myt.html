<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>麥頭批量生成器</title>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Microsoft JhengHei","PingFang TC",Arial,sans-serif;color:#000;font-weight:700}
:root{
  --bp-font-size:80px;
  --title-font-size:18px;
  --field-align:center;
  --line:2px solid #000;
  --page-w:210mm;
  --page-min-h:297mm
}
body{background:#f3f3f3;padding:12px}
button,input,textarea,select{font:inherit}
.app{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:360px 1fr;gap:16px;align-items:start}
.panel{background:#fff;border:1px solid #cfcfcf;border-radius:16px;padding:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);position:sticky;top:12px}
.panel h1{font-size:24px;margin-bottom:10px}
.panel h2{font-size:16px;margin:14px 0 8px}
.panel p,.panel li,.hint{font-size:13px;line-height:1.5;font-weight:700}
.panel textarea,.panel input,.panel select{width:100%;border:1px solid #999;border-radius:10px;padding:8px;background:#fff}
.panel textarea{min-height:108px;resize:vertical}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.row-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:8px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.actions-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:10px}
button{border:none;border-radius:999px;padding:10px 14px;cursor:pointer}
.btn-primary{background:#0b875b;color:#fff}
.btn-secondary{background:#111;color:#fff}
.btn-light{background:#ececec;color:#000}
.btn-danger{background:#b42318;color:#fff}
.preview-wrap{display:flex;flex-direction:column;gap:16px}
.a4-page + .a4-page{margin-top:16px}
.a4-page{width:210mm;min-height:297mm;background:#fff;border:1px solid #cfcfcf;margin:0 auto;padding:10mm}
.table-block{margin-bottom:10mm;page-break-inside:avoid;break-inside:avoid}
.label-title{font-size:var(--title-font-size);text-align:center;letter-spacing:1px;margin-bottom:6px}
.main-table{width:100%;border-collapse:collapse;table-layout:fixed}
.main-table td{border:var(--line);padding:4px 6px;text-align:center;vertical-align:middle;height:42px}
.label-col{width:22%;background:#fff;font-size:14px}
.data-col{width:32%}
.barcode-col{width:46%;padding:2px}
.merged-mid{border-right:none!important}
.merged-right{border-left:none!important}
.data-col input,.barcode-col input,.title-input{width:100%;border:none;outline:none;background:transparent;text-align:var(--field-align);font-size:14px}
.title-input{font-size:var(--title-font-size)}
.barcode-col svg{max-width:100%;height:32px;display:block;margin:0 auto}
.merge-cell-wrap{display:flex;align-items:center;gap:8px;width:100%;padding:0 4px}
.merge-cell-wrap input{flex:1}
.merge-cell-wrap svg{flex:0 0 120px;height:30px}
.bigBpInput{border:none !important;font-size:var(--bp-font-size) !important;font-weight:1000;text-align:center !important;width:100%;height:100%;outline:none;background:transparent;letter-spacing:1px;line-height:1;vertical-align:middle;padding:0}
.block-toolbar{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin:0 0 6px}
.block-toolbar button{padding:6px 10px;border-radius:999px;font-size:12px}
.muted{color:#555;font-weight:700}
.small{font-size:12px}
@media (max-width: 1200px){
  .app{grid-template-columns:1fr}
  .panel{position:static}
  .a4-page{width:100%;min-height:auto;padding:12px}
}
@media print{
  html,body{width:100%;height:auto;background:#fff;padding:0;margin:0}
  .panel,.block-toolbar{display:none!important}
  .app{display:block}
  .preview-wrap{display:block}
  .a4-page{width:100%;min-height:auto;border:none;padding:0;margin:0;box-shadow:none;page-break-inside:avoid;break-inside:avoid}
  .table-block{margin-bottom:8mm;page-break-inside:avoid;break-inside:avoid}
  .main-table,.main-table tr,.main-table td{page-break-inside:avoid!important;break-inside:avoid!important}
  @page{
    size:A4;
    margin:8mm;
  }
  @page landscape{
    size:A4 landscape;
    margin:8mm;
  }
}
</style>
</head>
<body>
<div class="app">
  <aside class="panel">
    <h1>麥頭批量生成器</h1>
    <p class="hint">保留原本骨架、格線與固定欄位邏輯，新增標題大小調整、零散自動判斷、快速套用全部、複製上一張、全域欄位填寫與列印優化。</p>

    <h2>頁面設定</h2>
    <div class="row">
      <label>
        <div class="small muted">預設大標題</div>
        <input id="globalPageTitle" value="竹北A3廠TO東明倉" />
      </label>
      <label>
        <div class="small muted">標題文字大小(px)</div>
        <input id="titleFontSizeInput" type="number" min="12" max="36" value="18" />
      </label>
    </div>
    <div class="row" style="margin-top:10px;">
      <label>
        <div class="small muted">BP文字大小(px)</div>
        <input id="fontSizeInput" type="number" min="30" max="140" value="80" />
      </label>
      <label>
        <div class="small muted">文字對齊</div>
        <select id="globalAlign">
          <option value="left">靠左</option>
          <option value="center" selected>置中</option>
          <option value="right">靠右</option>
        </select>
      </label>
    </div>
    <div class="row" style="margin-top:10px;">
      <label>
        <div class="small muted">每頁最多張數</div>
        <select id="perPageCount">
          <option value="2" selected>2</option>
          <option value="4">4</option>
        </select>
      </label>
      <label>
        <div class="small muted">列印方向</div>
        <select id="printOrientation">
          <option value="portrait" selected>直式</option>
          <option value="landscape">橫式</option>
        </select>
      </label>
    </div>

    <h2>批量資料</h2>
    <p class="small muted">格式：每行一張；欄位依序為 棧板編號, 料號, 片數箱數, 每板數量, 箱數, 跳過欄, DATE CODE</p>
    <textarea id="batchText" placeholder="A01,180-16612-DFGF-E30,10×4+15×7+20×1,165,12,2612165,2026/03/16
A02,180-16612-DFGF-E30,20×10,200,10,2613*200,2026/03/23"></textarea>
    <div class="row-4">
      <button class="btn-light" id="pasteBatchBtn">貼上</button>
      <button class="btn-light" id="copyBatchBtn">複製</button>
      <button class="btn-light" id="clearBatchBtn">清除</button>
      <button class="btn-light" id="demoBtn">載入範例</button>
    </div>
    <div class="actions" style="margin-top:10px">
      <button class="btn-primary" id="generateBtn">批量生成</button>
    </div>

    <h2>全域快速填寫</h2>
    <div class="row-3">
      <label><div class="small muted">TICKET#</div><input id="bulkTicket" placeholder="輸入TICKET編號" /></label>
      <label><div class="small muted">出廠日期</div><input id="bulkOutDate" placeholder="例如 2026/6/15" /></label>
      <label><div class="small muted">板材積(cm)</div><input id="bulkVolume" value="未超材" /></label>
    </div>
    <div class="row-3" style="margin-top:10px;">
      <label><div class="small muted">毛重(kg)</div><input id="bulkWeight" value="未超重" /></label>
      <label><div class="small muted">右上標註</div><input id="bulkTopNote" value="TO LOC" /></label>
      <label><div class="small muted">BP代碼</div><input id="bulkBP" value="BP01" /></label>
    </div>
    <div class="actions-3">
      <button class="btn-secondary" id="applyAllBtn">套用到全部</button>
      <button class="btn-light" id="copyFirstBtn">第一張同步全部</button>
      <button class="btn-danger" id="clearBtn">清空全部</button>
    </div>

    <h2>操作</h2>
    <div class="actions">
      <button class="btn-primary" id="printBtn">列印全部</button>
      <button class="btn-light" id="addEmptyBtn">加一張空白麥頭</button>
    </div>
  </aside>

  <main class="preview-wrap" id="previewWrap"></main>
</div>

<script>
const root = document.documentElement;
const previewWrap = document.getElementById('previewWrap');
const batchText = document.getElementById('batchText');
const printOrientation = document.getElementById('printOrientation');
const titleFontSizeInput = document.getElementById('titleFontSizeInput');
const defaultDemo = `A01,180-16612-DFGF-E30,10×4+15×7+20×1,165,12,2612*165,2026/03/16
A02,180-16612-DFGF-E30,20×10,200,10,2613*200,2026/03/23`;
let alignValue = 'center';

function esc(v=''){
  return String(v)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

function detectLoose(qtyStr){
  if(!qtyStr) return 'N';
  return qtyStr.includes('+') ? 'Y' : 'N';
}

function makeLabelHTML(data, index, totalCount){
  const [pallet='', part='', qtyBox='', perPal='', boxNum='', skip='', dateCode=''] = data;
  const title = document.getElementById('globalPageTitle').value.trim() || '竹北A3廠TO東明倉';
  const autoLoose = detectLoose(qtyBox);

  return `
    <section class="table-block" data-index="${index}">
      <div class="block-toolbar">
        <button class="btn-light duplicate-btn" type="button">複製此張</button>
        <button class="btn-light clone-prev-btn" type="button">套用上一張內容</button>
        <button class="btn-light delete-btn" type="button">刪除此張</button>
      </div>
      <div class="label-title"><input class="title-input page-title" value="${esc(title)}"></div>
      <table class="main-table">
        <tr>
          <td class="label-col">出廠日期</td>
          <td colspan="2" class="data-col"><input class="outDate syncable" value=""></td>
        </tr>
        <tr>
          <td class="label-col">TICKET#</td>
          <td class="data-col merged-mid"><input class="val0 syncable" value=""></td>
          <td class="barcode-col merged-right"><svg class="bc0"></svg></td>
        </tr>
        <tr>
          <td class="label-col">料號</td>
          <td class="data-col merged-mid"><input class="val1 syncable" value="${esc(part.trim())}"></td>
          <td class="barcode-col merged-right"><svg class="bc1"></svg></td>
        </tr>
        <tr>
          <td class="label-col">DATE CODE</td>
          <td class="data-col merged-mid"><input class="val2 syncable" value="${esc(dateCode.trim())}"></td>
          <td class="barcode-col merged-right"><svg class="bc2"></svg></td>
        </tr>
        <tr>
          <td class="label-col">箱數</td>
          <td class="data-col merged-mid"><input class="val3 syncable" value="${esc(boxNum.trim())}"></td>
          <td class="barcode-col merged-right"><svg class="bc3"></svg></td>
        </tr>
        <tr>
          <td class="label-col">每板數量</td>
          <td class="data-col merged-mid"><input class="qtyPerPal syncable" value="${esc(perPal.trim())}"></td>
          <td class="barcode-col merged-right"><svg class="bc_qtyPerPal"></svg></td>
        </tr>
        <tr>
          <td class="label-col">棧板編號</td>
          <td class="data-col merged-mid"><input class="val4 syncable" value="${esc(pallet.trim())}"></td>
          <td class="barcode-col merged-right"><svg class="bc4"></svg></td>
        </tr>
        <tr>
          <td class="label-col">片數*箱數</td>
          <td colspan="2" class="data-col"><input class="val5 syncable" value="${esc(qtyBox.trim())}"></td>
        </tr>
        <tr>
          <td class="label-col">板材積(cm)</td>
          <td class="data-col"><input class="volume syncable" value="未超材"></td>
          <td class="barcode-col"><input class="topNote syncable" value="TO LOC"></td>
        </tr>
        <tr>
          <td class="label-col">毛重(kg)</td>
          <td class="data-col"><input class="weight syncable" value="未超重"></td>
          <td class="barcode-col" rowspan="3"><input class="bigBpInput bpCode syncable" value="BP01"></td>
        </tr>
        <tr>
          <td class="label-col">是否零散</td>
          <td class="data-col"><input class="loose syncable" value="${autoLoose}"></td>
        </tr>
        <tr>
          <td class="label-col">移轉單總板數</td>
          <td class="data-col"><input class="totalCount syncable" value="${totalCount}"></td>
        </tr>
      </table>
    </section>
  `;
}

function renderBarcode(inputEl, svgEl){
  if(!inputEl || !svgEl) return;
  const text = inputEl.value.trim();
  svgEl.innerHTML = '';
  if(!text) return;
  try{
    JsBarcode(svgEl, text, {
      format:'CODE128',
      width:2,
      height:30,
      displayValue:false,
      margin:0,
      lineColor:'#000',
      background:'#fff'
    });
  }catch(err){
    console.warn('barcode error', err);
  }
}

function bindBlock(block){
  const pairs = [
    ['.val0','.bc0'],
    ['.val1','.bc1'],
    ['.val2','.bc2'],
    ['.val3','.bc3'],
    ['.val4','.bc4'],
    ['.qtyPerPal','.bc_qtyPerPal']
  ];

  pairs.forEach(([inputSel,svgSel])=>{
    const input = block.querySelector(inputSel);
    const svg = block.querySelector(svgSel);
    if(!input || !svg) return;
    renderBarcode(input, svg);
    input.addEventListener('input',()=>renderBarcode(input, svg));
  });

  block.querySelectorAll('input').forEach(inp=>inp.style.textAlign = alignValue);

  const bp = block.querySelector('.bigBpInput');
  if(bp){
    bp.style.fontSize = getComputedStyle(document.documentElement).getPropertyValue('--bp-font-size');
  }

  block.querySelector('.duplicate-btn').addEventListener('click',()=>duplicateBlock(block));
  block.querySelector('.clone-prev-btn').addEventListener('click',()=>clonePrevious(block));
  block.querySelector('.delete-btn').addEventListener('click',()=>deleteBlock(block));

  const qtyInput = block.querySelector('.val5');
  if(qtyInput){
    qtyInput.addEventListener('input',()=>{
      const looseInput = block.querySelector('.loose');
      if(looseInput) looseInput.value = detectLoose(qtyInput.value);
    });
  }
}

function paginateBlocks(){
  const blocks = [...previewWrap.querySelectorAll('.table-block')];
  const perPage = Number(document.getElementById('perPageCount').value) || 2;
  if(!blocks.length){
    previewWrap.innerHTML = '';
    return;
  }
  const pages = [];
  for(let i=0;i<blocks.length;i+=perPage){
    pages.push(blocks.slice(i, i+perPage));
  }
  previewWrap.innerHTML = '';
  pages.forEach(group=>{
    const page = document.createElement('section');
    page.className = 'a4-page';
    group.forEach(block=>page.appendChild(block));
    previewWrap.appendChild(page);
  });
  refreshTotals();
}

function refreshTotals(){
  const total = previewWrap.querySelectorAll('.table-block').length;
  previewWrap.querySelectorAll('.totalCount').forEach(el=>el.value = total);
}

function buildFromLines(lines){
  const validRows = [];
  for(let line of lines){
    let trimLine = line.trim();
    if(!trimLine) continue;
    trimLine = trimLine.replace(/^,+/,'').replace(/,+$/,'');
    const cols = trimLine.split(',').map(v=>v.trim());
    while(cols.length < 7) cols.push('');
    validRows.push(cols);
  }

  const total = validRows.length;
  const blocks = validRows.map((row, index)=>{
    const holder = document.createElement('div');
    holder.innerHTML = makeLabelHTML(row, index, total);
    return holder.firstElementChild;
  });

  previewWrap.innerHTML = '';
  const page = document.createElement('section');
  page.className = 'a4-page';
  blocks.forEach(block=>{
    page.appendChild(block);
    bindBlock(block);
  });
  previewWrap.appendChild(page);
  paginateBlocks();
}

function collectFieldMap(block){
  return {
    pageTitle: block.querySelector('.page-title').value,
    outDate: block.querySelector('.outDate').value,
    val0: block.querySelector('.val0').value,
    val1: block.querySelector('.val1').value,
    val2: block.querySelector('.val2').value,
    val3: block.querySelector('.val3').value,
    qtyPerPal: block.querySelector('.qtyPerPal').value,
    val4: block.querySelector('.val4').value,
    val5: block.querySelector('.val5').value,
    volume: block.querySelector('.volume').value,
    topNote: block.querySelector('.topNote').value,
    weight: block.querySelector('.weight').value,
    loose: block.querySelector('.loose').value,
    bpCode: block.querySelector('.bpCode').value
  };
}

function applyFieldMap(block, map){
  Object.entries(map).forEach(([key,val])=>{
    const el = block.querySelector('.' + key) || block.querySelector('#' + key);
    if(el) el.value = val;
  });

  const barcodePairs = [
    ['.val0','.bc0'],
    ['.val1','.bc1'],
    ['.val2','.bc2'],
    ['.val3','.bc3'],
    ['.val4','.bc4'],
    ['.qtyPerPal','.bc_qtyPerPal']
  ];

  barcodePairs.forEach(([inputSel, svgSel])=>{
    const input = block.querySelector(inputSel);
    const svg = block.querySelector(svgSel);
    if(input && svg) renderBarcode(input, svg);
  });
}

function duplicateBlock(block){
  const map = collectFieldMap(block);
  const holder = document.createElement('div');
  holder.innerHTML = makeLabelHTML(['','','','','','',''], 0, 0);
  const newBlock = holder.firstElementChild;
  block.after(newBlock);
  bindBlock(newBlock);
  applyFieldMap(newBlock, map);
  paginateBlocks();
}

function clonePrevious(block){
  const prev = block.previousElementSibling?.classList.contains('table-block') ? block.previousElementSibling : null;
  if(!prev){
    alert('這一張前面沒有上一張可套用');
    return;
  }
  applyFieldMap(block, collectFieldMap(prev));
}

function deleteBlock(block){
  if(previewWrap.querySelectorAll('.table-block').length <= 1){
    alert('至少保留一張');
    return;
  }
  block.remove();
  paginateBlocks();
}

function applyGlobalFields(){
  const fields = {
    val0: document.getElementById('bulkTicket').value,
    outDate: document.getElementById('bulkOutDate').value,
    volume: document.getElementById('bulkVolume').value,
    weight: document.getElementById('bulkWeight').value,
    topNote: document.getElementById('bulkTopNote').value,
    bpCode: document.getElementById('bulkBP').value,
    pageTitle: document.getElementById('globalPageTitle').value
  };

  previewWrap.querySelectorAll('.table-block').forEach(block=>{
    block.querySelector('.val0').value = fields.val0;
    block.querySelector('.outDate').value = fields.outDate;
    block.querySelector('.volume').value = fields.volume;
    block.querySelector('.weight').value = fields.weight;
    block.querySelector('.topNote').value = fields.topNote;
    block.querySelector('.bpCode').value = fields.bpCode;
    block.querySelector('.page-title').value = fields.pageTitle;
    renderBarcode(block.querySelector('.val0'), block.querySelector('.bc0'));
  });
}

function syncFirstToAll(){
  const first = previewWrap.querySelector('.table-block');
  if(!first) return;
  const map = collectFieldMap(first);
  previewWrap.querySelectorAll('.table-block').forEach((block, idx)=>{
    if(idx !== 0) applyFieldMap(block, map);
  });
}

document.getElementById('pasteBatchBtn').addEventListener('click', async ()=>{
  try{
    const text = await navigator.clipboard.readText();
    batchText.value = text;
  }catch(e){
    alert('無法讀取剪貼簿，請手動貼上');
  }
});

document.getElementById('copyBatchBtn').addEventListener('click', async ()=>{
  try{
    await navigator.clipboard.writeText(batchText.value);
    alert('已複製批量資料');
  }catch(e){
    alert('複製失敗');
  }
});

document.getElementById('clearBatchBtn').addEventListener('click', ()=>{
  batchText.value = '';
});

document.getElementById('fontSizeInput').addEventListener('input', e=>{
  const size = Number(e.target.value) || 80;
  root.style.setProperty('--bp-font-size', size + 'px');
  document.querySelectorAll('.bigBpInput').forEach(el=>el.style.fontSize = size + 'px');
});

titleFontSizeInput.addEventListener('input', e=>{
  const size = Number(e.target.value) || 18;
  root.style.setProperty('--title-font-size', size + 'px');
  document.querySelectorAll('.title-input').forEach(el=>el.style.fontSize = size + 'px');
});

document.getElementById('globalAlign').addEventListener('change', e=>{
  alignValue = e.target.value;
  root.style.setProperty('--field-align', alignValue);
  previewWrap.querySelectorAll('.table-block input').forEach(inp=>inp.style.textAlign = alignValue);
});

document.getElementById('generateBtn').addEventListener('click', ()=>{
  const lines = batchText.value.trim().split('\n');
  if(!lines.filter(l=>l.trim()).length){
    alert('請先輸入批量資料');
    return;
  }
  buildFromLines(lines);
  applyGlobalFields();
});

document.getElementById('demoBtn').addEventListener('click', ()=>{
  batchText.value = defaultDemo;
});

document.getElementById('applyAllBtn').addEventListener('click', applyGlobalFields);
document.getElementById('copyFirstBtn').addEventListener('click', syncFirstToAll);

document.getElementById('clearBtn').addEventListener('click', ()=>{
  if(confirm('確定清空畫面與資料？')) previewWrap.innerHTML = '';
});

document.getElementById('perPageCount').addEventListener('change', paginateBlocks);

document.getElementById('addEmptyBtn').addEventListener('click', ()=>{
  const holder = document.createElement('div');
  holder.innerHTML = makeLabelHTML(['','','','','','',''], 0, 0);
  const block = holder.firstElementChild;

  if(!previewWrap.querySelector('.a4-page')){
    const page = document.createElement('section');
    page.className = 'a4-page';
    previewWrap.appendChild(page);
  }

  previewWrap.querySelector('.a4-page').appendChild(block);
  bindBlock(block);
  applyGlobalFields();
  paginateBlocks();
});

document.getElementById('printBtn').addEventListener('click', ()=>{
  window.print();
});
</script>
</body>
</html>
